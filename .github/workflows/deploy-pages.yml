# Builds the static calculator (regenerates site/data.js from the CSVs in
# sources/latest) and publishes the site/ directory to the gh-pages branch,
# which GitHub Pages serves automatically.
name: Deploy static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate data.js from CSV sources
        run: python3 scripts/build_data.py

      - name: Publish site/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
