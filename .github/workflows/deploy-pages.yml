# Builds the static calculator (regenerates site/data.js from the data in
# sources/), runs the test suite, and publishes the site/ directory to the
# gh-pages branch, which GitHub Pages serves automatically.
#
# Pull requests get a live preview deployed under pr-preview/pr-<N>/ on the
# same gh-pages branch (via rossjrw/pr-preview-action), and the bot comments
# the URL on the PR. The preview is removed automatically when the PR closes.
name: Deploy static site

on:
  push:
    branches: [main]
  pull_request:
    # "closed" is needed so the preview can be torn down when a PR is merged
    # or closed; the other three are the defaults that trigger a (re)deploy.
    types: [opened, reopened, synchronize, closed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-deploy:
    # Skip on PR-close events: nothing to build or test, only the preview
    # teardown (handled by the deploy-preview job) needs to run.
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate data.js from data sources
        run: python3 scripts/build_data.py

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run calculator tests
        run: |
          cd tests
          npm ci
          npm test

      - name: Publish site/ to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # Preserve the pr-preview/ umbrella directory so a production
          # deploy doesn't wipe live PR previews living on the same branch.
          keep_files: true

  deploy-preview:
    # Deploy (or tear down) a per-PR preview at
    # https://<owner>.github.io/<repo>/pr-preview/pr-<N>/
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate data.js from data sources
        if: github.event.action != 'closed'
        run: python3 scripts/build_data.py

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./site/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
