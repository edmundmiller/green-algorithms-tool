# Builds the static calculator (regenerates site/data.js from the data in
# sources/), runs the test suite, and deploys the site/ directory to GitHub
# Pages using the official Actions-based Pages deployment.
#
# Requires the repository's Pages source to be "GitHub Actions"
# (Settings -> Pages -> Build and deployment -> Source). The configure-pages
# step below sets this automatically.
name: Deploy static site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege defaults; the deploy job needs pages + id-token to publish.
permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress production
# deploy (cancelling mid-publish can leave Pages in a half-updated state).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate data.js from data sources
        run: python3 scripts/build_data.py

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run calculator tests
        run: |
          cd tests
          npm ci
          npm test

      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    # Only the default branch publishes; PRs stop after build-test.
    if: github.ref == 'refs/heads/main'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
